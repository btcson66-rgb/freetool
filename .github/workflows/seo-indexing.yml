name: SEO indexing automation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '24 18 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-and-submit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Generate deployment sitemaps
        run: node scripts/generate-sitemaps.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Validate sitemap URLs
        run: node scripts/validate-indexable-urls.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit IndexNow URLs
        run: node scripts/submit-indexnow.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Submit Bing URLs
        if: always()
        run: node scripts/submit-bing-urls.mjs
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}

      - name: Submit sitemap to Google Search Console
        if: always()
        run: node scripts/gsc-submit-sitemaps.mjs
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}

      - name: Upload SEO reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-indexing-reports
          path: reports/

  weekly-inspection:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Generate sitemaps
        run: node scripts/generate-sitemaps.mjs

      - name: Validate sitemap URLs
        run: node scripts/validate-indexable-urls.mjs

      - name: Inspect priority URLs with GSC URL Inspection API
        run: node scripts/gsc-inspect-priority-urls.mjs
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}

      - name: Upload weekly indexing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-indexing-report
          path: reports/
